name: Deploy

# Drives the deploy pipeline contract documented in
# docs/PRODUCTION_ADDENDUM.md § Schema migration policy and
# docs/DEPLOY-RUNBOOK.md:
#   build -> push -> bootstrap -> verify-grants -> migrate -> roll -> settle.
#
# Triggers
# - push to master         -> staging deploy (auto)
# - workflow_dispatch       -> staging OR prod (manual)
#
# Prod deploys are gated by three controls, all required:
#   1. The 'prod' GitHub Environment (repo Settings -> Environments -> prod):
#      master-only deployment-branch policy + required-reviewer approval.
#   2. The "Refuse prod from non-master ref" step below (defense in depth).
#   3. The AppStack OIDC trust, whose sub-claim is scoped to
#      repo:wcmc-its/Scholars-Profile-System:environment:prod -- an env-scoped
#      sub, NOT a branch ref (see cdk/lib/app-stack.ts).
#
# All AWS resource names and CFN outputs consumed here are provisioned by
# Sps-App-${env} (see cdk/lib/app-stack.ts). Bootstrap two-step
# (PRODUCTION_ADDENDUM § Bootstrap two-step) must run once per env before the
# first workflow run can succeed.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        type: choice
        options: [staging, prod]
        default: staging
        required: true

concurrency:
  group: deploy-${{ inputs.env || 'staging' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "665083158573"

jobs:
  deploy:
    name: Deploy to ${{ inputs.env || 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.env || 'staging' }}
    steps:
      - name: Refuse prod from non-master ref
        if: ${{ inputs.env == 'prod' && github.ref != 'refs/heads/master' }}
        run: |
          echo "::error::Production deploys are only permitted from master. ref=${{ github.ref }}"
          exit 1

      - name: Resolve target env
        id: target
        run: |
          target="${{ inputs.env || 'staging' }}"
          echo "env=$target" >> "$GITHUB_OUTPUT"
          echo "stack=Sps-App-$target" >> "$GITHUB_OUTPUT"
          echo "role=arn:aws:iam::${AWS_ACCOUNT_ID}:role/sps-deploy-$target" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.target.outputs.role }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Discover AppStack outputs
        id: outputs
        run: |
          set -euo pipefail
          out=$(aws cloudformation describe-stacks \
            --stack-name "${{ steps.target.outputs.stack }}" \
            --query 'Stacks[0].Outputs' --output json)
          ecr_uri=$(echo "$out"     | jq -er '.[]|select(.OutputKey=="EcrRepoUri").OutputValue')
          cluster=$(echo "$out"     | jq -er '.[]|select(.OutputKey=="EcsClusterName").OutputValue')
          service=$(echo "$out"     | jq -er '.[]|select(.OutputKey=="EcsServiceName").OutputValue')
          mig_family=$(echo "$out"  | jq -er '.[]|select(.OutputKey=="EcsMigrationTaskFamily").OutputValue')
          alb_dns=$(echo "$out"     | jq -er '.[]|select(.OutputKey=="PublicAlbDns").OutputValue')
          # ETL batch-image repo (#454). Non-fatal jq (`//empty`): on the first
          # deploy after this change the AppStack output may not exist yet, so
          # the ETL build/push steps below self-skip when it's empty. Re-run the
          # workflow once `cdk deploy Sps-App-<env>` has created the repo.
          etl_ecr_uri=$(echo "$out" | jq -r '.[]|select(.OutputKey=="EtlEcrRepoUri").OutputValue // empty')
          # db-bootstrap task family (#493). Same non-fatal pattern: absent until
          # `cdk deploy Sps-App-<env>` ships the new task def, so the step below
          # self-skips (with a warning) rather than bricking discovery. Once the
          # family exists, a FAILED bootstrap hard-fails the deploy (fails-closed).
          bootstrap_family=$(echo "$out" | jq -r '.[]|select(.OutputKey=="EcsDbBootstrapTaskFamily").OutputValue // empty')
          # grant-equality verify task family (ADR-009). Same non-fatal pattern:
          # absent until `cdk deploy Sps-App-<env>` ships the new task def, so the
          # step below self-skips (with a warning). Once present, a FAILED verify
          # hard-fails the deploy (fails-closed -- the load-bearing grant gate).
          verify_family=$(echo "$out" | jq -r '.[]|select(.OutputKey=="EcsVerifyGrantsTaskFamily").OutputValue // empty')
          {
            echo "ecr_uri=$ecr_uri"
            echo "cluster=$cluster"
            echo "service=$service"
            echo "mig_family=$mig_family"
            echo "alb_dns=$alb_dns"
            echo "etl_ecr_uri=$etl_ecr_uri"
            echo "bootstrap_family=$bootstrap_family"
            echo "verify_family=$verify_family"
          } >> "$GITHUB_OUTPUT"

      - name: ECR login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          set -euo pipefail
          # NEXT_DEPLOYMENT_ID = the deploying commit SHA, inlined by Next for
          # version-skew protection (Dockerfile `build` stage): a client loaded
          # from an older build that navigates onto a newer task hard-reloads
          # instead of silently dropping the click. The ETL image below is not a
          # Next app, so it does not get the arg.
          #
          # NEXT_ISR_CACHE_S3 (#1503) = whether the shared S3 ISR cacheHandler is
          # compiled into the image. next.config reads it at `next build` (the
          # standalone config is baked), so it is a build-arg, not a task-def env.
          # Per-env activation policy lives here: staging soaks it on; prod stays
          # off until the soak passes — flip prod to "on" below when ready. The
          # env's IsrCacheBucket must be provisioned (cdk deploy Sps-App-<env>)
          # before turning it on, else the handler runs cold (no bucket → no
          # shared store).
          if [ "${{ steps.target.outputs.env }}" = "prod" ]; then
            ISR_CACHE_S3="off"
          else
            ISR_CACHE_S3="on"
          fi
          docker build \
            --build-arg NEXT_DEPLOYMENT_ID="${{ github.sha }}" \
            --build-arg NEXT_ISR_CACHE_S3="$ISR_CACHE_S3" \
            --tag "${{ steps.outputs.outputs.ecr_uri }}:${{ github.sha }}" \
            --tag "${{ steps.outputs.outputs.ecr_uri }}:latest" \
            .

      - name: Push image
        run: |
          set -euo pipefail
          docker push "${{ steps.outputs.outputs.ecr_uri }}:${{ github.sha }}"
          docker push "${{ steps.outputs.outputs.ecr_uri }}:latest"

      # ETL batch image (#454) -- the tsx-based etl/* + search:index scripts.
      # Built from the `etl` target of the same Dockerfile and pushed to the
      # dedicated scholars-etl-<env> repo. Self-skips when EtlEcrRepoUri is
      # absent (repo not yet created by cdk deploy); re-run after deploy.
      - name: Build and push ETL image
        if: ${{ steps.outputs.outputs.etl_ecr_uri != '' }}
        run: |
          set -euo pipefail
          docker build --target etl \
            --tag "${{ steps.outputs.outputs.etl_ecr_uri }}:${{ github.sha }}" \
            --tag "${{ steps.outputs.outputs.etl_ecr_uri }}:latest" \
            .
          docker push "${{ steps.outputs.outputs.etl_ecr_uri }}:${{ github.sha }}"
          docker push "${{ steps.outputs.outputs.etl_ecr_uri }}:latest"

      - name: Skipped ETL image (repo not yet provisioned)
        if: ${{ steps.outputs.outputs.etl_ecr_uri == '' }}
        run: |
          echo "::warning::EtlEcrRepoUri not found on ${{ steps.target.outputs.stack }}. ETL image not built/pushed. Run 'cdk deploy ${{ steps.target.outputs.stack }}' to create scholars-etl-${{ steps.target.outputs.env }}, then re-run this workflow."

      # Static-asset sync to S3 (#700) — make old content-hashed chunks survive a
      # deploy. The Next standalone image bakes `.next/static`; when ECS rolls,
      # the old image's chunks vanish, so HTML cached just before the deploy can
      # 404 a chunk (the L1 60s clamp bounds stale HTML; this removes the 404
      # entirely). Extract `.next/static` from the just-pushed image and sync it
      # ADDITIVELY (NO --delete) to the bucket fronted by the `/_next/static/*`
      # CloudFront behavior, so every past hash stays resolvable. Runs BEFORE the
      # service roll so the new tasks' HTML finds its chunks in S3. Self-skips
      # until `cdk deploy Sps-Edge-<env>` (manual) has created the bucket + its
      # StaticAssetsBucketName output; until then assets serve from the ALB via
      # the origin-group fallback, so a skip is non-fatal.
      - name: Sync static assets to S3
        run: |
          set -euo pipefail
          bucket=$(aws cloudformation describe-stacks \
            --stack-name "Sps-Edge-${{ steps.target.outputs.env }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`StaticAssetsBucketName`].OutputValue' \
            --output text 2>/dev/null || true)
          if [ -z "$bucket" ] || [ "$bucket" = "None" ]; then
            echo "::warning::StaticAssetsBucketName not found on Sps-Edge-${{ steps.target.outputs.env }}. Static assets NOT synced (#700). Run 'cdk deploy Sps-Edge-${{ steps.target.outputs.env }}' (manual, with the edge context flags) to provision the bucket, then re-run. Non-fatal: assets still serve from the ALB via the origin-group fallback."
            exit 0
          fi
          cid=$(docker create "${{ steps.outputs.outputs.ecr_uri }}:${{ github.sha }}")
          docker cp "$cid:/app/.next/static" /tmp/next-static
          docker rm "$cid" >/dev/null
          aws s3 sync /tmp/next-static "s3://$bucket/_next/static/" \
            --no-progress \
            --cache-control 'public, max-age=31536000, immutable'
          echo "Synced $(find /tmp/next-static -type f | wc -l) files to s3://$bucket/_next/static/ (additive, no --delete)."

      # db-bootstrap (#493) — provision scholars_audit + the app-rw INSERT grant
      # BEFORE migrate, as the least-privilege sps_bootstrap user. Idempotent;
      # fails-closed (non-zero exit halts the deploy, service not rolled), so a
      # missing/mis-scoped audit grant errors loud-and-early here instead of
      # silently breaking Hide/Show + the request-change audit at runtime.
      - name: Run db-bootstrap task
        id: db_bootstrap
        if: ${{ steps.outputs.outputs.bootstrap_family != '' }}
        run: |
          set -euo pipefail
          # Reuse the app service's network config (same private subnets + app SG,
          # which already has Aurora 3306 ingress + the Secrets Manager endpoint).
          netcfg=$(aws ecs describe-services \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --services "${{ steps.outputs.outputs.service }}" \
            --query 'services[0].networkConfiguration' --output json)
          task_arn=$(aws ecs run-task \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --task-definition "${{ steps.outputs.outputs.bootstrap_family }}" \
            --launch-type FARGATE \
            --network-configuration "$netcfg" \
            --query 'tasks[0].taskArn' --output text)
          echo "db-bootstrap task: $task_arn"
          aws ecs wait tasks-stopped \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --tasks "$task_arn"
          exit_code=$(aws ecs describe-tasks \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --tasks "$task_arn" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$exit_code" != "0" ]; then
            echo "::error::db-bootstrap task exited $exit_code. Service NOT rolled. Logs: /aws/ecs/sps-db-bootstrap-${{ steps.target.outputs.env }}"
            exit 1
          fi

      - name: Skipped db-bootstrap (task family not yet provisioned)
        if: ${{ steps.outputs.outputs.bootstrap_family == '' }}
        run: |
          echo "::warning::EcsDbBootstrapTaskFamily not found on ${{ steps.target.outputs.stack }}. scholars_audit provisioning skipped (#493). Run 'cdk deploy ${{ steps.target.outputs.stack }}' to create sps-db-bootstrap-${{ steps.target.outputs.env }}, then re-run this workflow."

      # grant-equality verify (ADR-009) — assert every managed DB role's live
      # grants EXACTLY equal its pinned golden list, AFTER db-bootstrap (so app-rw
      # already holds the audit INSERT) and BEFORE migrate / the service roll.
      # Read-only; fails-closed (a delta in either direction exits non-zero and
      # halts the deploy) — the gate that kills the manual-grant drift class.
      - name: Run verify-grants task
        id: verify_grants
        if: ${{ steps.outputs.outputs.verify_family != '' }}
        run: |
          set -euo pipefail
          # Reuse the app service's network config (same private subnets + app SG,
          # which already has Aurora 3306 ingress + the Secrets Manager endpoint).
          netcfg=$(aws ecs describe-services \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --services "${{ steps.outputs.outputs.service }}" \
            --query 'services[0].networkConfiguration' --output json)
          task_arn=$(aws ecs run-task \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --task-definition "${{ steps.outputs.outputs.verify_family }}" \
            --launch-type FARGATE \
            --network-configuration "$netcfg" \
            --query 'tasks[0].taskArn' --output text)
          echo "verify-grants task: $task_arn"
          aws ecs wait tasks-stopped \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --tasks "$task_arn"
          exit_code=$(aws ecs describe-tasks \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --tasks "$task_arn" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$exit_code" != "0" ]; then
            echo "::error::verify-grants task exited $exit_code (DB role grants drifted from the golden list). Service NOT rolled. Logs: /aws/ecs/sps-verify-grants-${{ steps.target.outputs.env }}"
            exit 1
          fi

      - name: Skipped verify-grants (task family not yet provisioned)
        if: ${{ steps.outputs.outputs.verify_family == '' }}
        run: |
          echo "::warning::EcsVerifyGrantsTaskFamily not found on ${{ steps.target.outputs.stack }}. DB grant-equality verify skipped (ADR-009). Run 'cdk deploy ${{ steps.target.outputs.stack }}' to create sps-verify-grants-${{ steps.target.outputs.env }}, then re-run this workflow."

      - name: Run migration task
        id: migrate
        run: |
          set -euo pipefail
          # Reuse the app service's network config so the migration task lands
          # in the same private subnets / SGs (DB access + Secrets Manager
          # endpoint reachable).
          netcfg=$(aws ecs describe-services \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --services "${{ steps.outputs.outputs.service }}" \
            --query 'services[0].networkConfiguration' --output json)
          task_arn=$(aws ecs run-task \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --task-definition "${{ steps.outputs.outputs.mig_family }}" \
            --launch-type FARGATE \
            --network-configuration "$netcfg" \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $task_arn"
          aws ecs wait tasks-stopped \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --tasks "$task_arn"
          exit_code=$(aws ecs describe-tasks \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --tasks "$task_arn" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$exit_code" != "0" ]; then
            echo "::error::Migration task exited $exit_code. Service NOT rolled. Logs: /aws/ecs/sps-migrate-${{ steps.target.outputs.env }}"
            exit 1
          fi

      - name: Update ECS service (force new deployment)
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --service "${{ steps.outputs.outputs.service }}" \
            --force-new-deployment \
            >/dev/null

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --services "${{ steps.outputs.outputs.service }}"

      - name: Confirm rollout healthy
        run: |
          set -euo pipefail
          # The authoritative health gate is the `services-stable` wait above:
          # ECS reports the service stable only once the ALB target-group health
          # check -- which polls /api/health -- passes. A direct HTTP probe from
          # the runner cannot serve as the smoke test, because the ALB admits
          # only requests bearing the B07 `X-Origin-Verify` shared secret that
          # CloudFront injects (app-stack.ts), and the deploy role is
          # intentionally NOT granted that secret. So assert running==desired
          # via the ECS API (DescribeServices, already in the deploy role)
          # rather than re-probe HTTP without the origin-verify header.
          read -r desired running <<<"$(aws ecs describe-services \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --services "${{ steps.outputs.outputs.service }}" \
            --query 'services[0].[desiredCount,runningCount]' --output text)"
          echo "desired=$desired running=$running"
          if [ "$running" -lt 1 ] || [ "$running" != "$desired" ]; then
            echo "::error::Service not fully running after rollout (desired=$desired running=$running)."
            exit 1
          fi
