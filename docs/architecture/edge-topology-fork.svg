 orient="auto-start-reverse"><path d="M0.5,0.8 L9.4,5 L0.5,9.2 L3,5 Z" fill="#0ca678"/></marker></defs><rect x="40" y="120" width="520" height="410" rx="14" fill="#ebfbee" fill-opacity="0.05" stroke="#2f9e44" stroke-width="1.4"/><rect x="600" y="120" width="760" height="410" rx="14" fill="#e7ecff" fill-opacity="0.04" stroke="#4263eb" stroke-width="1.4"/><path d="M300,210 C300,246 300,202 300,238" fill="none" stroke="#868e96" stroke-width="1.8" stroke-linecap="round" marker-end="url(#mGray)"/><path d="M300,294 C300,330 300,286 300,322" fill="none" stroke="#7d1c1c" stroke-width="1.8" stroke-linecap="round" marker-end="url(#mMaroon)"/><path d="M300,378 C300,414 300,370 300,406" fill="none" stroke="#868e96" stroke-width="1.8" stroke-linecap="round" marker-end="url(#mGray)"/><path d="M300,462 C300,498 300,454 300,490" fill="none" stroke="#868e96" stroke-width="1.8" stroke-linecap="round" marker-end="url(#mGray)"/><rect x="279.375" y="214.5" width="41.25" height="18" rx="9" fill="#ffffff" stroke="#868e96" stroke-opacity="0.45"/><text x="300" y="227.4" font-size="10" fill="#3a434f" text-anchor="middle">HTTPS</text><rect x="238.425" y="298.5" width="123.14999999999999" height="18" rx="9" fill="#ffffff" stroke="#7d1c1c" stroke-opacity="0.45"/><text x="300" y="311.4" font-size="10" fill="#3a434f" text-anchor="middle">origin · HTTPS-only</text><rect x="232.575" y="382.5" width="134.85" height="18" rx="9" fill="#ffffff" stroke="#868e96" stroke-opacity="0.45"/><text x="300" y="395.4" font-size="10" fill="#3a434f" text-anchor="middle">:80 · X-Origin-Verify</text><rect x="276.45" y="466.5" width="47.099999999999994" height="18" rx="9" fill="#ffffff" stroke="#868e96" stroke-opacity="0.45"/><text x="300" y="479.4" font-size="10" fill="#3a434f" text-anchor="middle">to app</text><g><rect x="56" y="107" width="268.79999999999995" height="26" rx="8" fill="#ffffff" stroke="#2f9e44" stroke-width="1.2"/><text x="190.39999999999998" y="124.5" font-size="12" font-weight="700" fill="#256f33" text-anchor="middle">Live request path · staging 2026-07-21</text></g><g><rect x="616" y="107" width="209.39999999999998" height="26" rx="8" fill="#ffffff" stroke="#4263eb" stroke-width="1.2"/><text x="720.7" y="124.5" font-size="12" font-weight="700" fill="#2b3a8c" text-anchor="middle">Where each environment stands</text></g><text x="40" y="40" font-size="12.5" font-weight="700" fill="#6a40c9" letter-spacing="0.5">EDGE TOPOLOGY · STAGING LIVE 2026-07-21 · PR #1852 · #502</text><text x="40" y="74" font-size="22" font-weight="800" fill="#1f2933">Live (staging): CloudFront + WAF → NetScaler → ALB → Fargate</text><rect x="1204" y="34" width="156" height="28" rx="14" fill="#f3eeff" stroke="#d6c9f0"/><text x="1282" y="52" font-size="11" font-weight="700" fill="#6a40c9" text-anchor="middle">STAGING LIVE</text><text x="64" y="150" font-size="11.5" fill="#6b7280">Origin leg HTTPS-only · NetScaler → ALB on :80 forwarding X-Origin-Verify</text><text x="632" y="150" font-size="11.5" fill="#6b7280">Prod mirrors staging once the NetScaler team stands up its VIP</text><rect x="40" y="548" width="1320" height="46" rx="8" fill="#fbf7f0" stroke="#ece2cf"/><text x="58" y="568" font-size="11" fill="#5b4a20">#461 WCM-only WAF gate stays until NetScaler enforces equivalent filtering · the ALB :443 listener is an unused origin guard (the live path is :80).</text><text x="58" y="585" font-size="11" fill="#5b4a20">Do not deploy the Edge stack (either env) until #1856 — its WAF allow-list sources a missing SSM param, so a deploy would strip the live IPSet.</text><g><rect x="140" y="170" width="320" height="40" rx="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.6" filter="url(#sh)"/><rect x="152" y="185" width="9" height="9" rx="2.5" fill="#868e96"/><text x="168" y="194" font-size="13.5" font-weight="700" fill="#343a40">Internet</text></g><g><rect x="140" y="238" width="320" height="56" rx="10" fill="#fbeaea" stroke="#7d1c1c" stroke-width="1.6" filter="url(#sh)"/><rect x="152" y="253" width="9" height="9" rx="2.5" fill="#7d1c1c"/><text x="168" y="262" font-size="13.5" font-weight="700" fill="#5e1414">CloudFront + AWS WAF</text><text x="154" y="279" font-size="11" fill="#5b6470">WCM-only gate (#461) · caching · managed rules</text></g><g><rect x="140" y="322" width="320" height="56" rx="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.6" filter="url(#sh)"/><rect x="152" y="337" width="9" height="9" rx="2.5" fill="#868e96"/><text x="168" y="346" font-size="13.5" font-weight="700" fill="#343a40">NetScaler VIP</text><text x="154" y="363" font-size="11" fill="#5b6470">AWS VPX · WCM edge layer</text><rect x="365.2" y="332" width="84.80000000000001" height="17" rx="8.5" fill="#f3eeff"/><text x="407.6" y="344" font-size="10" font-weight="700" fill="#6a40c9" text-anchor="middle">staging live</text></g><g><rect x="140" y="406" width="320" height="56" rx="10" fill="#e7ecff" stroke="#4263eb" stroke-width="1.6" filter="url(#sh)"/><rect x="152" y="421" width="9" height="9" rx="2.5" fill="#4263eb"/><text x="168" y="430" font-size="13.5" font-weight="700" fill="#2b3a8c">Public ALB</text><text x="154" y="447" font-size="11" fill="#5b6470">:80 listener · X-Origin-Verify guard</text><rect x="406.5" y="416" width="43.5" height="17" rx="8.5" fill="#f3eeff"/><text x="428.25" y="428" font-size="10" font-weight="700" fill="#6a40c9" text-anchor="middle">stays</text></g><g><rect x="140" y="490" width="320" height="40" rx="10" fill="#e3faf3" stroke="#0ca678" stroke-width="1.6" filter="url(#sh)"/><rect x="152" y="505" width="9" height="9" rx="2.5" fill="#0ca678"/><text x="168" y="514" font-size="13.5" font-weight="700" fill="#0b6e4f">ECS Fargate app</text></g><g><rect x="632" y="196" width="696" height="104" rx="10" fill="#ebfbee" stroke="#2f9e44" stroke-width="1.6" filter="url(#sh)"/><rect x="644" y="211" width="9" height="9" rx="2.5" fill="#2f9e44"/><text x="660" y="220" font-size="13.5" font-weight="700" fill="#256f33">Staging — cut over &amp; live (2026-07-21)</text><text x="646" y="237" font-size="11" fill="#5b6470">CloudFront routes all dynamic behaviours + the default through the NetScaler VIP → app ALB.</text><text x="646" y="252" font-size="11" fill="#5b6470">Origin leg is HTTPS-only — an HTTP origin behind the VIP's HTTP→HTTPS upgrade loops forever.</text><text x="646" y="267" font-size="11" fill="#5b6470">Durable in CDK: the #1507 origin-flip is seeded for staging (PR #1852, merged).</text></g><g><rect x="632" y="340" width="696" height="108" rx="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.6" filter="url(#sh)"/><rect x="644" y="355" width="9" height="9" rx="2.5" fill="#868e96"/><text x="660" y="364" font-size="13.5" font-weight="700" fill="#343a40">Prod — pending NetScaler VIP</text><text x="646" y="381" font-size="11" fill="#5b6470">The prod VIP does not exist yet; prod still points straight at its :80-only ALB.</text><text x="646" y="396" font-size="11" fill="#5b6470">NetScaler team stands up the prod VIP — follow-up meeting Fri 2026-07-24 (RITM0801140).</text><text x="646" y="411" font-size="11" fill="#5b6470">Then mirror staging: VIP origin HTTPS-only, repoint behaviours, seed CDK. Edge deploy gated on #1856.</text></g></svg>