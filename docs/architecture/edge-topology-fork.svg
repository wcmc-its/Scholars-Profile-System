5" height="18" rx="9" fill="#ffffff" stroke="#868e96" stroke-opacity="0.45"/><text x="885" y="237.4" font-size="10" fill="#3a434f" text-anchor="middle">HTTPS</text><rect x="829.275" y="288.5" width="111.44999999999999" height="18" rx="9" fill="#ffffff" stroke="#e03131" stroke-opacity="0.45"/><text x="885" y="301.4" font-size="10" fill="#3a434f" text-anchor="middle">path? (CDN front)</text><rect x="835.125" y="352.5" width="99.75" height="18" rx="9" fill="#ffffff" stroke="#868e96" stroke-opacity="0.45"/><text x="885" y="365.4" font-size="10" fill="#3a434f" text-anchor="middle">X-Origin-Verify</text><rect x="867.3" y="416.5" width="35.4" height="18" rx="9" fill="#ffffff" stroke="#868e96" stroke-opacity="0.45"/><text x="885" y="429.4" font-size="10" fill="#3a434f" text-anchor="middle">:443</text><g><rect x="56" y="107" width="222.6" height="26" rx="8" fill="#ffffff" stroke="#7d1c1c" stroke-width="1.2"/><text x="167.3" y="124.5" font-size="12" font-weight="700" fill="#5e1414" text-anchor="middle">Option A · Replace the AWS edge</text></g><g><rect x="736" y="107" width="209.39999999999998" height="26" rx="8" fill="#ffffff" stroke="#4263eb" stroke-width="1.2"/><text x="840.7" y="124.5" font-size="12" font-weight="700" fill="#2b3a8c" text-anchor="middle">Option B · Front the AWS edge</text></g><text x="40" y="40" font-size="12.5" font-weight="700" fill="#7d1c1c" letter-spacing="0.5">EDGE TOPOLOGY DECISION · RITM0792011 · #502</text><text x="40" y="74" font-size="22" font-weight="800" fill="#1f2933">Does NetScaler replace the AWS edge, or front it?</text><rect x="1188" y="34" width="176" height="28" rx="14" fill="#fceced" stroke="#e7b9bf"/><text x="1276" y="52" font-size="11" font-weight="700" fill="#a12e3a" text-anchor="middle">DECISION REQUIRED</text><text x="64" y="166" font-size="11.5" fill="#6b7280">NetScaler instead of CloudFront + WAF</text><text x="744" y="166" font-size="11.5" fill="#6b7280">NetScaler in front of CloudFront + WAF</text><rect x="40" y="548" width="1324" height="46" rx="8" fill="#fbf7f0" stroke="#ece2cf"/><text x="58" y="568" font-size="11" fill="#5b4a20">#461 WCM-only WAF gate stays until resolved · the :80 default-403 origin guard currently 403s NetScaler (RITM0792011).</text><text x="58" y="585" font-size="11" fill="#5b4a20">Pin down what "fronting" means (NetScaler to ALB vs NetScaler to CloudFront) before the meeting — it changes the origin-guard story.</text><g><rect x="80" y="200" width="170" height="38" rx="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.6" filter="url(#sh)"/><rect x="92" y="215" width="9" height="9" rx="2.5" fill="#868e96"/><text x="108" y="224" font-size="13.5" font-weight="700" fill="#343a40">Internet</text></g><g><rect x="80" y="270" width="170" height="38" rx="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.6" filter="url(#sh)"/><rect x="92" y="285" width="9" height="9" rx="2.5" fill="#868e96"/><text x="108" y="294" font-size="13.5" font-weight="700" fill="#343a40">NetScaler</text></g><g><rect x="80" y="340" width="170" height="38" rx="10" fill="#e7ecff" stroke="#4263eb" stroke-width="1.6" filter="url(#sh)"/><rect x="92" y="355" width="9" height="9" rx="2.5" fill="#4263eb"/><text x="108" y="364" font-size="13.5" font-weight="700" fill="#2b3a8c">Public ALB</text></g><g><rect x="80" y="410" width="170" height="40" rx="10" fill="#e3faf3" stroke="#0ca678" stroke-width="1.6" filter="url(#sh)"/><rect x="92" y="425" width="9" height="9" rx="2.5" fill="#0ca678"/><text x="108" y="434" font-size="13.5" font-weight="700" fill="#0b6e4f">ECS app</text></g><g><rect x="286" y="198" width="372" height="102" rx="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.6" filter="url(#sh)"/><rect x="298" y="213" width="9" height="9" rx="2.5" fill="#868e96"/><text x="314" y="222" font-size="13.5" font-weight="700" fill="#343a40">Implications</text><text x="300" y="239" font-size="11" fill="#5b6470">·  Lose AWS WAF + CloudFront caching</text><text x="300" y="254" font-size="11" fill="#5b6470">·  #461 WCM-only gate moves to NetScaler</text><text x="300" y="269" font-size="11" fill="#5b6470">·  Edge failover / DR becomes on-prem</text></g><g><rect x="286" y="326" width="372" height="64" rx="10" fill="#fff0f0" stroke="#e03131" stroke-width="1.6" stroke-dasharray="6 4" filter="url(#sh)"/><rect x="298" y="341" width="9" height="9" rx="2.5" fill="#e03131"/><text x="314" y="350" font-size="13.5" font-weight="700" fill="#b02525">Open · RITM0792011</text><text x="300" y="367" font-size="11" fill="#5b6470">NetScaler-&gt;ALB port + :80 default-403 exception</text></g><g><rect x="800" y="184" width="170" height="36" rx="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.6" filter="url(#sh)"/><rect x="812" y="199" width="9" height="9" rx="2.5" fill="#868e96"/><text x="828" y="208" font-size="13.5" font-weight="700" fill="#343a40">Internet</text></g><g><rect x="800" y="248" width="170" height="36" rx="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.6" filter="url(#sh)"/><rect x="812" y="263" width="9" height="9" rx="2.5" fill="#868e96"/><text x="828" y="272" font-size="13.5" font-weight="700" fill="#343a40">NetScaler</text></g><g><rect x="800" y="312" width="170" height="36" rx="10" fill="#fbeaea" stroke="#7d1c1c" stroke-width="1.6" filter="url(#sh)"/><rect x="812" y="327" width="9" height="9" rx="2.5" fill="#7d1c1c"/><text x="828" y="336" font-size="13.5" font-weight="700" fill="#5e1414">CloudFront + WAF</text></g><g><rect x="800" y="376" width="170" height="36" rx="10" fill="#e7ecff" stroke="#4263eb" stroke-width="1.6" filter="url(#sh)"/><rect x="812" y="391" width="9" height="9" rx="2.5" fill="#4263eb"/><text x="828" y="400" font-size="13.5" font-weight="700" fill="#2b3a8c">Public ALB</text></g><g><rect x="800" y="440" width="170" height="40" rx="10" fill="#e3faf3" stroke="#0ca678" stroke-width="1.6" filter="url(#sh)"/><rect x="812" y="455" width="9" height="9" rx="2.5" fill="#0ca678"/><text x="828" y="464" font-size="13.5" font-weight="700" fill="#0b6e4f">ECS app</text></g><g><rect x="1006" y="198" width="358" height="102" rx="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.6" filter="url(#sh)"/><rect x="1018" y="213" width="9" height="9" rx="2.5" fill="#868e96"/><text x="1034" y="222" font-size="13.5" font-weight="700" fill="#343a40">Implications</text><text x="1020" y="239" font-size="11" fill="#5b6470">·  Keep AWS WAF + CloudFront caching</text><text x="1020" y="254" font-size="11" fill="#5b6470">·  Origin guard unchanged (CDN fronts ALB)</text><text x="1020" y="269" font-size="11" fill="#5b6470">·  Confirm fronting a CDN is intended</text></g><g><rect x="1006" y="326" width="358" height="64" rx="10" fill="#fff0f0" stroke="#e03131" stroke-width="1.6" stroke-dasharray="6 4" filter="url(#sh)"/><rect x="1018" y="341" width="9" height="9" rx="2.5" fill="#e03131"/><text x="1034" y="350" font-size="13.5" font-weight="700" fill="#b02525">Open · #502</text><text x="1020" y="367" font-size="11" fill="#5b6470">Is 'front' = NetScaler-&gt;CloudFront, or -&gt;ALB?</text></g></svg>