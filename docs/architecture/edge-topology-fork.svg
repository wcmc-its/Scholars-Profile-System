<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 612" width="1400" height="612" font-family="Inter,-apple-system,Segoe UI,Helvetica,Arial,sans-serif"><rect width="100%" height="100%" fill="#fbfcfe"/><defs><filter id="sh" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="1.4" stdDeviation="2.4" flood-color="#0b1f3a" flood-opacity="0.14"/></filter><marker id="mGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" markerUnits="userSpaceOnUse" orient="auto-start-reverse"><path d="M0.5,0.8 L9.4,5 L0.5,9.2 L3,5 Z" fill="#868e96"/></marker><marker id="mMaroon" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" markerUnits="userSpaceOnUse" orient="auto-start-reverse"><path d="M0.5,0.8 L9.4,5 L0.5,9.2 L3,5 Z" fill="#7d1c1c"/></marker><marker id="mRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" markerUnits="userSpaceOnUse" orient="auto-start-reverse"><path d="M0.5,0.8 L9.4,5 L0.5,9.2 L3,5 Z" fill="#e03131"/></marker><marker id="mGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" markerUnits="userSpaceOnUse" orient="auto-start-reverse"><path d="M0.5,0.8 L9.4,5 L0.5,9.2 L3,5 Z" fill="#2f9e44"/></marker><marker id="mIndigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" markerUnits="userSpaceOnUse" orient="auto-start-reverse"><path d="M0.5,0.8 L9.4,5 L0.5,9.2 L3,5 Z" fill="#4263eb"/></marker><marker id="mViolet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" markerUnits="userSpaceOnUse" orient="auto-start-reverse"><path d="M0.5,0.8 L9.4,5 L0.5,9.2 L3,5 Z" fill="#7048e8"/></marker><marker id="mAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" markerUnits="userSpaceOnUse" orient="auto-start-reverse"><path d="M0.5,0.8 L9.4,5 L0.5,9.2 L3,5 Z" fill="#f08c00"/></marker><marker id="mTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" markerUnits="userSpaceOnUse" orient="auto-start-reverse"><path d="M0.5,0.8 L9.4,5 L0.5,9.2 L3,5 Z" fill="#0ca678"/></marker></defs><rect x="40" y="120" width="520" height="410" rx="14" fill="#ebfbee" fill-opacity="0.05" stroke="#2f9e44" stroke-width="1.4"/><rect x="600" y="120" width="760" height="410" rx="14" fill="#e7ecff" fill-opacity="0.04" stroke="#4263eb" stroke-width="1.4"/><path d="M300,210 C300,246 300,202 300,238" fill="none" stroke="#868e96" stroke-width="1.8" stroke-linecap="round" marker-end="url(#mGray)"/><path d="M300,294 C300,330 300,286 300,322" fill="none" stroke="#7d1c1c" stroke-width="1.8" stroke-linecap="round" marker-end="url(#mMaroon)"/><path d="M300,378 C300,414 300,370 300,406" fill="none" stroke="#868e96" stroke-width="1.8" stroke-linecap="round" marker-end="url(#mGray)"/><path d="M300,462 C300,498 300,454 300,490" fill="none" stroke="#868e96" stroke-width="1.8" stroke-linecap="round" marker-end="url(#mGray)"/><rect x="279.375" y="214.5" width="41.25" height="18" rx="9" fill="#ffffff" stroke="#868e96" stroke-opacity="0.45"/><text x="300" y="227.4" font-size="10" fill="#3a434f" text-anchor="middle">HTTPS</text><rect x="276.45" y="298.5" width="47.099999999999994" height="18" rx="9" fill="#ffffff" stroke="#7d1c1c" stroke-opacity="0.45"/><text x="300" y="311.4" font-size="10" fill="#3a434f" text-anchor="middle">origin</text><rect x="250.125" y="382.5" width="99.75" height="18" rx="9" fill="#ffffff" stroke="#868e96" stroke-opacity="0.45"/><text x="300" y="395.4" font-size="10" fill="#3a434f" text-anchor="middle">X-Origin-Verify</text><rect x="282.3" y="466.5" width="35.4" height="18" rx="9" fill="#ffffff" stroke="#868e96" stroke-opacity="0.45"/><text x="300" y="479.4" font-size="10" fill="#3a434f" text-anchor="middle">:443</text><g><rect x="56" y="107" width="282" height="26" rx="8" fill="#ffffff" stroke="#2f9e44" stroke-width="1.2"/><text x="197" y="124.5" font-size="12" font-weight="700" fill="#256f33" text-anchor="middle">Decided target path · Fabrice 2026-07-02</text></g><g><rect x="616" y="107" width="262.2" height="26" rx="8" fill="#ffffff" stroke="#4263eb" stroke-width="1.2"/><text x="747.1" y="124.5" font-size="12" font-weight="700" fill="#2b3a8c" text-anchor="middle">Where it stands + the one open choice</text></g><text x="40" y="40" font-size="12.5" font-weight="700" fill="#256f33" letter-spacing="0.5">EDGE TOPOLOGY · RESOLVED 2026-07-02 · RITM0792011 · #502</text><text x="40" y="74" font-size="22" font-weight="800" fill="#1f2933">Decided: CloudFront + WAF → NetScaler → ALB → Fargate</text><rect x="1224" y="34" width="136" height="28" rx="14" fill="#ebfbee" stroke="#b7dfc0"/><text x="1292" y="52" font-size="11" font-weight="700" fill="#256f33" text-anchor="middle">DECIDED</text><text x="64" y="150" font-size="11.5" fill="#6b7280">CloudFront and the WAF stay · the ALB stays because the app is Fargate</text><text x="632" y="150" font-size="11.5" fill="#6b7280">Getting there = inserting NetScaler; the only debate is when</text><rect x="40" y="548" width="1320" height="46" rx="8" fill="#fbf7f0" stroke="#ece2cf"/><text x="58" y="568" font-size="11" fill="#5b4a20">#461 WCM-only WAF gate stays until NetScaler enforces equivalent filtering · the :80 default-403 origin guard is unchanged (the ALB is kept).</text><text x="58" y="585" font-size="11" fill="#5b4a20">NetScaler insertion is decoupled from the item-3 VPC move (recommended): repoint the CloudFront origin to the new ALB now, add NetScaler in front as a follow-on.</text><g><rect x="140" y="170" width="320" height="40" rx="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.6" filter="url(#sh)"/><rect x="152" y="185" width="9" height="9" rx="2.5" fill="#868e96"/><text x="168" y="194" font-size="13.5" font-weight="700" fill="#343a40">Internet</text></g><g><rect x="140" y="238" width="320" height="56" rx="10" fill="#fbeaea" stroke="#7d1c1c" stroke-width="1.6" filter="url(#sh)"/><rect x="152" y="253" width="9" height="9" rx="2.5" fill="#7d1c1c"/><text x="168" y="262" font-size="13.5" font-weight="700" fill="#5e1414">CloudFront + AWS WAF</text><text x="154" y="279" font-size="11" fill="#5b6470">WCM-only gate (#461) · caching · managed rules</text></g><g><rect x="140" y="322" width="320" height="56" rx="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.6" filter="url(#sh)"/><rect x="152" y="337" width="9" height="9" rx="2.5" fill="#868e96"/><text x="168" y="346" font-size="13.5" font-weight="700" fill="#343a40">NetScaler</text><text x="154" y="363" font-size="11" fill="#5b6470">on-prem · inserted edge layer (WCM)</text><rect x="382.9" y="332" width="67.1" height="17" rx="8.5" fill="#e0e7ff"/><text x="416.45" y="344" font-size="10" font-weight="700" fill="#3730a3" text-anchor="middle">to insert</text></g><g><rect x="140" y="406" width="320" height="56" rx="10" fill="#e7ecff" stroke="#4263eb" stroke-width="1.6" filter="url(#sh)"/><rect x="152" y="421" width="9" height="9" rx="2.5" fill="#4263eb"/><text x="168" y="430" font-size="13.5" font-weight="700" fill="#2b3a8c">Public ALB</text><text x="154" y="447" font-size="11" fill="#5b6470">X-Origin-Verify origin guard</text><rect x="406.5" y="416" width="43.5" height="17" rx="8.5" fill="#f3eeff"/><text x="428.25" y="428" font-size="10" font-weight="700" fill="#6a40c9" text-anchor="middle">stays</text></g><g><rect x="140" y="490" width="320" height="40" rx="10" fill="#e3faf3" stroke="#0ca678" stroke-width="1.6" filter="url(#sh)"/><rect x="152" y="505" width="9" height="9" rx="2.5" fill="#0ca678"/><text x="168" y="514" font-size="13.5" font-weight="700" fill="#0b6e4f">ECS Fargate app</text></g><g><rect x="632" y="168" width="696" height="60" rx="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.6" filter="url(#sh)"/><rect x="644" y="183" width="9" height="9" rx="2.5" fill="#868e96"/><text x="660" y="192" font-size="13.5" font-weight="700" fill="#343a40">Today (as deployed)</text><text x="646" y="209" font-size="11" fill="#5b6470">Both CloudFront distributions point straight at their ALB — NetScaler is not in the path yet.</text><text x="646" y="224" font-size="11" fill="#5b6470">Inserting it is a WCM edge change, orthogonal to the item-3 VPC move (no CDK change).</text></g><g><rect x="632" y="248" width="696" height="76" rx="10" fill="#ebfbee" stroke="#2f9e44" stroke-width="1.6" filter="url(#sh)"/><rect x="644" y="263" width="9" height="9" rx="2.5" fill="#2f9e44"/><text x="660" y="272" font-size="13.5" font-weight="700" fill="#256f33">Sequencing A · decouple   ✓ recommended</text><text x="646" y="289" font-size="11" fill="#5b6470">Repoint the CloudFront origin to the new ALB in-window — SPS-only, no WCM dependency.</text><text x="646" y="304" font-size="11" fill="#5b6470">WCM inserts NetScaler in front of the ALB as a separate follow-on. Q11 = N/A.</text></g><g><rect x="632" y="344" width="696" height="72" rx="10" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.6" filter="url(#sh)"/><rect x="644" y="359" width="9" height="9" rx="2.5" fill="#868e96"/><text x="660" y="368" font-size="13.5" font-weight="700" fill="#343a40">Sequencing B · couple</text><text x="646" y="385" font-size="11" fill="#5b6470">Insert NetScaler at cutover: CloudFront origin → NetScaler VIP → new ALB.</text><text x="646" y="400" font-size="11" fill="#5b6470">Q11 becomes a hard in-window gate — WCM must be ready.</text></g><g><rect x="632" y="436" width="696" height="72" rx="10" fill="#fff0f0" stroke="#e03131" stroke-width="1.6" stroke-dasharray="6 4" filter="url(#sh)"/><rect x="644" y="451" width="9" height="9" rx="2.5" fill="#e03131"/><text x="660" y="460" font-size="13.5" font-weight="700" fill="#b02525">Still open · #502 / RITM0792011 — sequencing only</text><text x="646" y="477" font-size="11" fill="#5b6470">Topology is decided; the remaining question is WHEN NetScaler is inserted.</text><text x="646" y="492" font-size="11" fill="#5b6470">:80 default-403 origin guard still 403s a NetScaler not sending X-Origin-Verify.</text></g></svg>