# Local dev services.
#
# Note: MySQL is intentionally NOT in this file. The local app talks to host
# MariaDB on 127.0.0.1:3306 (homebrew install). See README.md "Local setup" for
# the rationale and the cleanup steps if you're migrating from the old
# `scholars-mysql` container. Run `npm run db:check` to confirm what your
# DATABASE_URL is actually pointing at.
services:
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: scholars-opensearch
    restart: unless-stopped
    environment:
      - cluster.name=scholars-cluster
      - node.name=scholars-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - "DISABLE_SECURITY_PLUGIN=true"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  opensearch-data:
