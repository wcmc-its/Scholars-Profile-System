# =============================================================================
# VIVO -> Scholars 301 redirect — nginx server config
# =============================================================================
# Consumes the RewriteMap generated by `npm run etl:vivo-redirect`
# (etl/vivo-redirect/generate-map.ts -> etl/vivo-redirect/output/vivo-redirect.map).
#
# This is the SERVER-SIDE half that the generator's header refers to: it runs on
# the legacy VIVO host and 301s old profile URLs to their current Scholars
# canonical URL, preserving link equity through cutover.
#
# STAGED, NOT DEPLOYED. Deploy only at cutover, per docs/vivo-cutover-redirect-runbook.md.
#
# Scope (matches generator D-01 + B14 middleware): only person-profile paths
#   /display/cwid-{cwid}, /individual/cwid-{cwid}, /profile/cwid-{cwid}
# are redirected. Deleted/unknown CWIDs and all other VIVO paths fall through to
# VIVO's existing handling (D-03). Non-profile VIVO URLs (search/browse/etc.) are
# intentionally OUT OF SCOPE here — decide their disposition separately (see the
# runbook "Out of scope" section).
#
# Security: the redirect target is never derived from user input. The CWID is
# extracted only to use as a lookup key into the trusted, build-generated map;
# an unmatched key yields "" and falls through. There is therefore no
# open-redirect surface (a crafted /display/cwid-<anything> that is not in the
# map simply 404s as before).
# -----------------------------------------------------------------------------

# ─── http {} context ─────────────────────────────────────────────────────────
# Place these THREE items in the http {} block, BEFORE the server {} that uses
# them. The default map_hash_max_size (2048) is too small for ~9k entries.

map_hash_max_size 16384;
map_hash_bucket_size 128;

# 1) Extract the bare CWID from a legacy profile path into $vivo_cwid.
#    Uses $uri (decoded, query string already stripped). Non-matching paths -> "".
#    Case-sensitive on `cwid-` to match the legacy URL contract and the B14 regex.
map $uri $vivo_cwid {
    default                                                                  "";
    "~^/(?:display|individual|profile)/cwid-(?<cwid>[A-Za-z0-9._-]+)/?$"      $cwid;
}

# 2) Resolve the CWID to its current Scholars URL. The included file is the
#    generated map (key = raw cwid, value = full https URL, ';'-terminated).
#    Unknown/absent CWIDs -> "" (fall through). Deploy the .map alongside this
#    config; the path below is a deploy-time placeholder — adjust to wherever
#    you stage the artifact on the VIVO host.
map $vivo_cwid $scholars_redirect {
    default                       "";
    include /etc/nginx/scholars/vivo-redirect.map;
}

# ─── server {} context (the VIVO vhost) ──────────────────────────────────────
# Add this location to the existing VIVO server {} block. It must come BEFORE
# any catch-all location that VIVO already serves these paths from.
#
#   location ~ ^/(?:display|individual|profile)/cwid- {
#       # 301 only when we resolved a live target; otherwise hand back to VIVO
#       # so its existing 404/410 handling runs (D-03 — deleted/unknown CWIDs).
#       if ($scholars_redirect != "") {
#           return 301 $scholars_redirect;
#       }
#       return 404;
#   }
#
# Notes:
#  - 301 (permanent) is correct for a migration: it transfers ranking signal and
#    is cached by Google/browsers. Do NOT use 302 here.
#  - The query string is intentionally dropped: the target is the canonical
#    profile URL. (VIVO profile pages took no meaningful query params.)
#  - `return 404` is the conservative fall-through. If you would rather send
#    unmapped legacy profile hits to the Scholars search/home instead of 404,
#    replace it with e.g. `return 301 https://scholars.weill.cornell.edu/;`
#    — but prefer 404/410 for genuinely deleted people so you don't dilute
#    canonical signals (see runbook).
