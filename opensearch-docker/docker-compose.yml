version: '3'
services:
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=PassWrd@123
      - plugins.security.ssl.http.enabled=false   # SSL disabled for HTTP
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - 9200:9200
      - 9600:9600
    networks:
      - opensearch-net

  dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: opensearch-dashboards
    ports:
      - 5601:5601
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'  # Use HTTP now
      OPENSEARCH_USERNAME: "admin"
      OPENSEARCH_PASSWORD: "PassWrd@123"
      OPENSEARCH_SSL_VERIFICATIONMODE: "none"
    depends_on:
      - opensearch
    networks:
      - opensearch-net

networks:
  opensearch-net:
